name: Build & Deploy

on:
  # Rebuild on any push to master (content/template changes)
  push:
    branches: [master]
    paths-ignore:
      - '_site/**'
  # Daily rebuild at 6 AM Eastern (11:00 UTC) for fresh calendar data
  schedule:
    - cron: '0 11 * * *'
  # Allow manual trigger from GitHub UI
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build site (CSS + HTML + images)
        run: npm run build:prod
        env:
          NODE_ENV: production

      - name: Check for changes
        id: changes
        run: |
          git add _site/
          if git diff --staged --quiet; then
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
          else
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit and push built site
        if: steps.changes.outputs.has_changes == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git commit -m "build: update site output [skip ci]"
          git push
